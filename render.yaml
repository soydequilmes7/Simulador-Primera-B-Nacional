services:
  - type: web
    name: simulador-primera-nacional-backend
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.index:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: RENDER
        value: "true"
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_SCHEMA
        value: public
