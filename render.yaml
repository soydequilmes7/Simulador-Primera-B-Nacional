services:
  - type: web
    name: simulador-primera-nacional-backend
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.index:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    disk:
      name: simulador-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: RENDER
        value: "true"
      - key: SIMULADOR_STATE_DIR
        value: /var/data
